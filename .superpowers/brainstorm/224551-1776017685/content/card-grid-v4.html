<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dyscrasia Manager — Masonry</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #d4c5a9; font-family: 'Segoe UI', system-ui, sans-serif; padding: 1.5rem; min-height: 100vh; }
  h1 { font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #a09070; margin-bottom: 1rem; }

  .search-row { display: flex; gap: 0.6rem; margin-bottom: 0.9rem; align-items: center; }
  .search-input {
    flex: 1; background: #1a0d0d; border: 1px solid #3a1a1a; border-radius: 5px;
    padding: 0.5rem 0.75rem; color: #d4c5a9; font-size: 0.82rem; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus { border-color: #cc2222; box-shadow: 0 0 0 2px #cc222222; }
  .search-input::placeholder { color: #585050; }
  .add-btn {
    background: #1a0505; border: 1px solid #cc2222; color: #cc2222; border-radius: 5px;
    padding: 0.5rem 0.9rem; font-size: 0.78rem; cursor: pointer;
    transition: box-shadow 0.15s, transform 0.12s;
  }
  .add-btn:hover { box-shadow: 0 0 10px #cc222255; }
  .add-btn:active { transform: scale(0.93); }

  .filter-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.1rem; }
  .chip {
    padding: 0.28rem 0.7rem; border-radius: 20px; font-size: 0.72rem;
    border: 1px solid #2a1010; color: #a09070; background: #120808;
    cursor: pointer; user-select: none;
    transition: border-color 0.18s, color 0.18s, background 0.18s, box-shadow 0.15s, transform 0.12s;
  }
  .chip:hover { border-color: #6a5a3a; color: #d4c5a9; }
  .chip:active { transform: scale(0.87); }
  .chip.active { background: #1a1006; border-color: #a09070; color: #d4c5a9; box-shadow: 0 0 6px #a0907033; }
  .chip[data-type="Phlegmatic"].active { border-color: #5080c0; color: #a0c0f0; background: #0a0f1a; box-shadow: 0 0 8px #5080c044; }
  .chip[data-type="Melancholy"].active { border-color: #7050a0; color: #c0a0e0; background: #0f0a18; box-shadow: 0 0 8px #7050a044; }
  .chip[data-type="Choleric"].active   { border-color: #cc2222; color: #f09090; background: #1a0505; box-shadow: 0 0 8px #cc222244; }
  .chip[data-type="Sanguine"].active   { border-color: #cc9922; color: #f0cc70; background: #1a1206; box-shadow: 0 0 8px #cc992244; }

  .results-label { font-size: 0.68rem; color: #585050; margin-bottom: 0.75rem; }
  .results-count-em { color: #a09070; }

  /* ── Masonry via CSS columns ── */
  .card-grid {
    column-width: 200px;
    column-gap: 0.75rem;
  }

  /* Cards size naturally to their content */
  .card {
    background: #120808;
    border: 1px solid #2a1010;
    border-radius: 8px;
    padding: 0.9rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    break-inside: avoid;          /* don't split across columns */
    margin-bottom: 0.75rem;
    width: 100%;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, opacity 0.22s, transform 0.28s;
    will-change: transform, opacity;
  }
  .card:hover { border-color: #3a1a1a; box-shadow: 0 2px 14px #0009; }
  .card.hidden {
    opacity: 0;
    transform: scale(0.82) translateY(6px);
    pointer-events: none;
  }

  .card-type { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.09em; font-weight: 600; }
  .card-type.Phlegmatic { color: #7090c0; }
  .card-type.Melancholy { color: #9070b0; }
  .card-type.Choleric   { color: #cc4444; }
  .card-type.Sanguine   { color: #cc9922; }

  .card-name { font-size: 0.88rem; font-weight: 600; color: #d4c5a9; line-height: 1.2; }

  /* Description — unclamped by default so cards breathe naturally */
  .card-desc { font-size: 0.72rem; color: #6a5a3a; line-height: 1.5; }

  /* Only cards that actually overflow get this class applied via JS */
  .card-desc.overflows {
    max-height: 260px;            /* ~15 lines */
    overflow: hidden;
    /* soft fade at the bottom instead of a hard cut */
    -webkit-mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
    mask-image:         linear-gradient(to bottom, black 55%, transparent 100%);
    transition: max-height 0.32s cubic-bezier(0.22, 1, 0.36, 1),
                -webkit-mask-image 0.28s ease,
                mask-image         0.28s ease;
  }
  .card-desc.overflows.expanded {
    max-height: 600px;            /* large enough for any real content */
    -webkit-mask-image: linear-gradient(to bottom, black 100%, transparent 100%);
    mask-image:         linear-gradient(to bottom, black 100%, transparent 100%);
  }

  .show-more-btn {
    align-self: flex-start;
    font-size: 0.62rem; color: #585050;
    border: none; background: none; padding: 0; cursor: pointer;
    transition: color 0.15s, transform 0.12s;
    margin-top: -0.1rem;
  }
  .show-more-btn:hover { color: #a09070; }
  .show-more-btn:active { transform: scale(0.9); }
  /* hidden until JS decides the card overflows */
  .show-more-btn { display: none; }
  .show-more-btn.needed { display: block; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 0.3rem; padding-top: 0.4rem; border-top: 1px solid #1e0e0e;
  }
  .card-bonus { font-size: 0.64rem; color: #a09070; }
  .card-actions { display: flex; gap: 0.3rem; }
  .card-action-btn {
    font-size: 0.6rem; padding: 0.18rem 0.38rem; border-radius: 3px; border: 1px solid;
    cursor: pointer; background: none;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
  }
  .card-action-btn:active { transform: scale(0.87); }
  .card-action-btn.edit { border-color: #4a3a1a; color: #cc9922; }
  .card-action-btn.edit:hover { background: #1a1206; box-shadow: 0 0 6px #cc992244; }
  .card-action-btn.del  { border-color: #3a1010; color: #cc4444; }
  .card-action-btn.del:hover  { background: #1a0505; box-shadow: 0 0 6px #cc222244; }
  .card-builtin-badge { font-size: 0.55rem; color: #585050; border: 1px solid #2a1a1a; border-radius: 3px; padding: 0.1rem 0.3rem; }

  .empty {
    text-align: center; color: #585050; padding: 3rem; font-size: 0.8rem;
    opacity: 0; transition: opacity 0.3s;
  }
  .empty.visible { opacity: 1; }

  /* Exit ghost */
  .exit-ghost {
    position: fixed; pointer-events: none; border-radius: 8px;
    background: #120808; border: 1px solid #2a1010; padding: 0.7rem;
    display: flex; flex-direction: column; gap: 0.3rem;
    z-index: 100;
    transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.55, 0, 1, 0.45);
  }
</style>
</head>
<body>

<h1>📋 Dyscrasias</h1>
<div class="search-row">
  <input class="search-input" id="search" placeholder="🔍  Search by name or description…" oninput="scheduleFilter()">
  <button class="add-btn">+ Add Custom</button>
</div>
<div class="filter-row">
  <div class="chip all active" data-type="all" onclick="toggleChip(this)">All</div>
  <div class="chip" data-type="Phlegmatic" onclick="toggleChip(this)">Phlegmatic</div>
  <div class="chip" data-type="Melancholy" onclick="toggleChip(this)">Melancholy</div>
  <div class="chip" data-type="Choleric"   onclick="toggleChip(this)">Choleric</div>
  <div class="chip" data-type="Sanguine"   onclick="toggleChip(this)">Sanguine</div>
</div>
<div class="results-label">Showing <em class="results-count-em" id="results-count">0</em> dyscrasias</div>
<div id="card-grid"></div>

<script>
const EASE_OUT = 'cubic-bezier(0.22, 1, 0.36, 1)';
const OVERFLOW_HEIGHT = 260; // px — must match .card-desc.overflows max-height

// Deliberately varied description lengths to show masonry effect
const dyscrasias = [
  { resonanceType:"Phlegmatic", name:"Unshakeable Calm",
    description:"The vampire's blood carries a preternatural stillness. Those who drink feel panic fade into cool resolve.",
    bonus:"+2 dice to Fortitude-related rolls", isCustom:false },

  { resonanceType:"Phlegmatic", name:"Still Waters",
    description:"A deep quietude flows through this blood, heightening perception without distorting it. Secrets surface unbidden. Lies become visible as clear water shows what lies beneath — a stillness that sees all and judges nothing. The vampire finds their senses extended to an unusual clarity.",
    bonus:"+2 dice to Auspex-related discipline rolls", isCustom:false },

  { resonanceType:"Melancholy", name:"Haunted",
    description:"The mortal's grief infused the blood with echoes of death. Something stirs in the dark when this vampire feeds.",
    bonus:"+2 dice to Oblivion-related discipline rolls", isCustom:false },

  { resonanceType:"Melancholy", name:"Hollow",
    description:"A profound emptiness — this mortal had given up something essential. Their vacancy becomes a veil the vampire can wear.",
    bonus:"+2 dice to Obfuscate-related discipline rolls", isCustom:false },

  { resonanceType:"Melancholy", name:"Last Light",
    description:"A mortal at the threshold of death, not yet gone. Their blood tastes of finality — of doors left ajar, of words unsaid, of one last look at a room you'll never see again. Death recognises its own and reaches back through the vitae to touch the vampire who carries it.",
    bonus:"+2 dice to Auspex when sensing death or the dying", isCustom:true },

  { resonanceType:"Choleric", name:"Berserker's Blood",
    description:"Rage crystallized into vitae. Drinking it, the vampire feels their limbs surge with terrible, uncomplicated force.",
    bonus:"+2 dice to Potence-related discipline rolls", isCustom:false },

  { resonanceType:"Choleric", name:"Hair-Trigger",
    description:"A mortal wound too tight, living entirely on adrenaline.",
    bonus:"+2 dice to Celerity-related discipline rolls", isCustom:false },

  { resonanceType:"Choleric", name:"Warlord's Vintage",
    description:"A soldier who had known nothing but war from their earliest memory — conscripted young, seasoned by decades of conflict across three continents. Their blood carries the weight of campaigns, the tactical clarity of a mind that has spent a lifetime calculating survival. Violence, for them, had become a language more fluent than any spoken tongue.",
    bonus:"+1 die to all Physical discipline rolls", isCustom:true },

  { resonanceType:"Sanguine", name:"True Believer",
    description:"Devotion so pure it altered the blood itself. Others feel the pull of conviction when this vampire speaks.",
    bonus:"+2 dice to Presence-related discipline rolls", isCustom:false },

  { resonanceType:"Sanguine", name:"Ecstatic",
    description:"Joy turned to fever in the blood. The vampire rides its warmth like a drug and cannot quite remember why solemnity ever seemed important. Something ancient stirs in the Tremere rites when this blood is used — the formula responds differently, as though the ecstasy opens doors the formulae were not written to open.",
    bonus:"+2 dice to Blood Sorcery-related discipline rolls", isCustom:false },
];

let activeTypes = new Set(['all']);
let currentVisible = new Set();
let searchTimer = null;
let emptyEl = null;

function makeEl(tag, cls, text) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (text !== undefined) el.textContent = text;
  return el;
}

function buildCard(d, idx) {
  const card = makeEl('div', 'card');
  card.dataset.idx = idx;

  const typeBadge  = makeEl('div', 'card-type ' + d.resonanceType, d.resonanceType);
  const name       = makeEl('div', 'card-name', d.name);
  const desc       = makeEl('div', 'card-desc', d.description);
  const showMore   = makeEl('button', 'show-more-btn', 'show more ▾');

  showMore.addEventListener('click', function(e) {
    e.stopPropagation();
    desc.classList.add('expanded');
    showMore.classList.remove('needed');
  });

  const footer = makeEl('div', 'card-footer');
  footer.appendChild(makeEl('div', 'card-bonus', d.bonus));

  if (d.isCustom) {
    const actions = makeEl('div', 'card-actions');
    const editBtn = makeEl('button', 'card-action-btn edit', '✎ Edit');
    const delBtn  = makeEl('button', 'card-action-btn del',  '✕');
    editBtn.addEventListener('click', e => e.stopPropagation());
    delBtn.addEventListener('click',  e => e.stopPropagation());
    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    footer.appendChild(actions);
  } else {
    footer.appendChild(makeEl('span', 'card-builtin-badge', 'built-in'));
  }

  card.appendChild(typeBadge);
  card.appendChild(name);
  card.appendChild(desc);
  card.appendChild(showMore);
  card.appendChild(footer);
  return card;
}

// Measure which descriptions overflow and mark them
function checkOverflows() {
  cardEls.forEach((card, i) => {
    const desc     = card.querySelector('.card-desc');
    const showMore = card.querySelector('.show-more-btn');
    // Temporarily remove any overflow class so we measure natural height
    const hadOverflows = desc.classList.contains('overflows');
    desc.classList.remove('overflows');
    void desc.offsetHeight; // force reflow
    const natural = desc.scrollHeight;
    if (hadOverflows) desc.classList.add('overflows');

    if (natural > OVERFLOW_HEIGHT + 10) {
      desc.classList.add('overflows');
      showMore.classList.add('needed');
    } else {
      desc.classList.remove('overflows');
      showMore.classList.remove('needed');
    }
  });
}

const cardEls = dyscrasias.map((d, i) => buildCard(d, i));
const grid = document.getElementById('card-grid');
grid.id = 'card-grid';
grid.className = 'card-grid';
cardEls.forEach(c => grid.appendChild(c));

// Check overflows after first paint
requestAnimationFrame(() => requestAnimationFrame(() => checkOverflows()));

function computeVisible() {
  const query = document.getElementById('search').value.toLowerCase();
  const out = new Set();
  dyscrasias.forEach((d, i) => {
    const typeMatch = activeTypes.has('all') || activeTypes.has(d.resonanceType);
    const textMatch = !query ||
      d.name.toLowerCase().includes(query) ||
      d.description.toLowerCase().includes(query) ||
      d.bonus.toLowerCase().includes(query);
    if (typeMatch && textMatch) out.add(i);
  });
  return out;
}

function toggleChip(el) {
  const type = el.dataset.type;
  const allChip = document.querySelector('.chip.all');
  if (type === 'all') {
    activeTypes = new Set(['all']);
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  } else {
    if (activeTypes.has('all')) { activeTypes.delete('all'); allChip.classList.remove('active'); }
    if (activeTypes.has(type)) { activeTypes.delete(type); el.classList.remove('active'); }
    else { activeTypes.add(type); el.classList.add('active'); }
    if (activeTypes.size === 0) { activeTypes.add('all'); allChip.classList.add('active'); }
  }
  filterCards();
}

function scheduleFilter() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(filterCards, 110);
}

function filterCards() {
  const shouldShow = computeVisible();
  document.getElementById('results-count').textContent = shouldShow.size;

  const entering = [...shouldShow].filter(i => !currentVisible.has(i));
  const exiting  = [...currentVisible].filter(i => !shouldShow.has(i));

  // Spawn exit ghosts then hide
  exiting.forEach(i => {
    const rect  = cardEls[i].getBoundingClientRect();
    const ghost = makeEl('div', 'exit-ghost');
    ghost.style.left   = rect.left + 'px';
    ghost.style.top    = rect.top  + 'px';
    ghost.style.width  = rect.width + 'px';
    ghost.style.opacity = '1';
    ghost.style.transform = 'scale(1)';
    const gType = makeEl('div', 'card-type ' + dyscrasias[i].resonanceType, dyscrasias[i].resonanceType);
    const gName = makeEl('div', 'card-name', dyscrasias[i].name);
    ghost.appendChild(gType);
    ghost.appendChild(gName);
    document.body.appendChild(ghost);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      ghost.style.opacity   = '0';
      ghost.style.transform = 'scale(0.74) translateY(8px)';
      setTimeout(() => ghost.remove(), 240);
    }));
    cardEls[i].classList.add('hidden');
    setTimeout(() => { cardEls[i].style.display = 'none'; }, 230);
  });

  // Reveal entering cards with staggered ease-in
  entering.forEach((i, idx) => {
    cardEls[i].style.display = '';
    void cardEls[i].offsetWidth;
    setTimeout(() => {
      cardEls[i].classList.remove('hidden');
    }, 30 + idx * 40);
  });

  currentVisible = new Set(shouldShow);

  // Empty state
  if (emptyEl) {
    const old = emptyEl; emptyEl = null;
    old.classList.remove('visible');
    setTimeout(() => old.remove(), 320);
  }
  if (shouldShow.size === 0) {
    emptyEl = makeEl('div', 'empty', 'No dyscrasias match your search.');
    grid.appendChild(emptyEl);
    requestAnimationFrame(() => requestAnimationFrame(() => emptyEl && emptyEl.classList.add('visible')));
  }
}

// Initial render — staggered entrance
cardEls.forEach((card, i) => {
  card.classList.add('hidden');
  currentVisible.add(i);
});
void grid.offsetHeight;
cardEls.forEach((_, i) => {
  setTimeout(() => { cardEls[i].classList.remove('hidden'); }, i * 38);
});
document.getElementById('results-count').textContent = dyscrasias.length;
</script>
</body>
</html>
