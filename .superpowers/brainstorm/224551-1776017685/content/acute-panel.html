<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acute Dyscrasia Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #d4c5a9; font-family: 'Segoe UI', system-ui, sans-serif; padding: 1.5rem; max-width: 680px; margin: 0 auto; }

  /* ── Existing result card (simplified) ── */
  .result-card {
    background: #1a0d0d; border: 1px solid #3a1a1a; border-radius: 6px;
    padding: 1.1rem 1.25rem; margin-bottom: 1.1rem;
    display: flex; flex-direction: column; gap: 0.55rem;
  }
  .result-row { display: flex; align-items: baseline; gap: 0.5rem; }
  .result-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; color: #a09070; width: 7rem; flex-shrink: 0; }
  .result-value { font-size: 0.9rem; font-weight: 600; }
  .result-value.choleric { color: #cc4444; }
  .result-value.acute    { color: #ff4444; text-shadow: 0 0 8px #ff444466; }
  .result-divider { border: none; border-top: 1px solid #2a1010; margin: 0.1rem 0; }

  /* ── Acute dyscrasia section ── */
  .acute-section {
    background: #120808; border: 1px solid #2a1010; border-radius: 6px;
    padding: 1rem 1.1rem;
  }
  .acute-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .acute-title {
    font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: #a09070;
  }
  .acute-title span { color: #cc4444; }

  .acute-controls { display: flex; align-items: center; gap: 0.5rem; }

  .search-input {
    background: #0f0606; border: 1px solid #2a1010; border-radius: 4px;
    padding: 0.3rem 0.6rem; color: #d4c5a9; font-size: 0.72rem; outline: none;
    width: 160px; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input:focus { border-color: #cc2222; box-shadow: 0 0 0 2px #cc222218; }
  .search-input::placeholder { color: #585050; }

  .reroll-btn {
    background: #1a0505; border: 1px solid #3a1010; color: #a09070;
    border-radius: 4px; padding: 0.3rem 0.65rem; font-size: 0.72rem; cursor: pointer;
    transition: border-color 0.15s, color 0.15s, box-shadow 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .reroll-btn:hover { border-color: #cc2222; color: #d4c5a9; box-shadow: 0 0 6px #cc222233; }
  .reroll-btn:active { transform: scale(0.93); }

  /* ── Dyscrasia card grid ── */
  .dysc-grid {
    column-width: 175px;
    column-gap: 0.6rem;
  }

  .dysc-card {
    background: #0f0606; border: 1px solid #1e0e0e; border-radius: 7px;
    padding: 0.75rem; display: flex; flex-direction: column; gap: 0.3rem;
    break-inside: avoid; margin-bottom: 0.6rem; width: 100%;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s, background 0.15s;
    position: relative;
  }
  .dysc-card:hover { border-color: #3a1a1a; box-shadow: 0 2px 10px #0008; }
  .dysc-card:active { transform: scale(0.97); }

  /* Auto-rolled highlight */
  .dysc-card.rolled {
    border-color: #cc4444;
    background: #1a0808;
    box-shadow: 0 0 12px #cc222233, inset 0 0 18px #cc22220a;
  }
  .dysc-card.rolled::after {
    content: 'rolled';
    position: absolute; top: 0.45rem; right: 0.5rem;
    font-size: 0.52rem; text-transform: uppercase; letter-spacing: 0.07em;
    color: #cc4444; opacity: 0.7;
  }

  /* Manually selected */
  .dysc-card.selected {
    border-color: #cc9922;
    background: #1a1206;
    box-shadow: 0 0 12px #cc992233, inset 0 0 18px #cc99220a;
  }
  .dysc-card.selected::after {
    content: 'selected ✓';
    position: absolute; top: 0.45rem; right: 0.5rem;
    font-size: 0.52rem; text-transform: uppercase; letter-spacing: 0.07em;
    color: #cc9922; opacity: 0.9;
  }

  .dysc-name  { font-size: 0.82rem; font-weight: 600; color: #d4c5a9; line-height: 1.2; padding-right: 2.5rem; }
  .dysc-desc  { font-size: 0.68rem; color: #6a5a3a; line-height: 1.4; }
  .dysc-bonus { font-size: 0.62rem; color: #a09070; margin-top: 0.15rem; padding-top: 0.3rem; border-top: 1px solid #1e0e0e; }

  /* Selected dyscrasia summary */
  .selection-summary {
    margin-top: 0.85rem; padding-top: 0.75rem;
    border-top: 1px solid #2a1010;
    display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
  }
  .selection-text { font-size: 0.72rem; color: #a09070; }
  .selection-text strong { color: #cc9922; }
  .confirm-btn {
    background: #1a0505; border: 1px solid #cc2222; color: #cc2222;
    border-radius: 4px; padding: 0.35rem 0.8rem; font-size: 0.72rem; cursor: pointer;
    transition: box-shadow 0.15s, transform 0.1s;
  }
  .confirm-btn:hover { box-shadow: 0 0 8px #cc222255; }
  .confirm-btn:active { transform: scale(0.93); }
</style>
</head>
<body>

<!-- Existing result card (already in the app) -->
<div class="result-card">
  <div class="result-row">
    <span class="result-label">Resonance</span>
    <span class="result-value choleric">Choleric</span>
  </div>
  <hr class="result-divider">
  <div class="result-row">
    <span class="result-label">Temperament</span>
    <span class="result-value acute">Acute</span>
  </div>
</div>

<!-- New acute dyscrasia section, appears below result card on Acute -->
<div class="acute-section">
  <div class="acute-header">
    <div class="acute-title">Dyscrasias — <span>Choleric</span></div>
    <div class="acute-controls">
      <input class="search-input" placeholder="🔍 filter…" oninput="filterDysc(this.value)">
      <button class="reroll-btn" onclick="reroll()">⟳ Re-roll</button>
    </div>
  </div>

  <div class="dysc-grid" id="dysc-grid"></div>

  <div class="selection-summary" id="summary">
    <div class="selection-text" id="summary-text">Auto-rolled: <strong>Hair-Trigger</strong></div>
    <button class="confirm-btn">Confirm</button>
  </div>
</div>

<script>
const cholericDysc = [
  { id:0, name:"Berserker's Blood",  desc:"Rage crystallized into vitae. The vampire feels their limbs surge with terrible, uncomplicated force.", bonus:"+2 dice to Potence-related rolls" },
  { id:1, name:"Hair-Trigger",       desc:"A mortal wound too tight, living on adrenaline. Every reflex sharpened to a razor's edge.", bonus:"+2 dice to Celerity-related rolls" },
  { id:2, name:"Warlord's Vintage",  desc:"A soldier who knew nothing but war. Their blood carries the weight of campaigns, violence distilled into something tactical.", bonus:"+1 die to all Physical discipline rolls" },
];

let rolledId   = 1; // Hair-Trigger auto-rolled
let selectedId = 1;

function makeEl(tag, cls, text) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (text !== undefined) el.textContent = text;
  return el;
}

function buildDyscCard(d) {
  const card = makeEl('div', 'dysc-card');
  if (d.id === rolledId)   card.classList.add('rolled');
  if (d.id === selectedId && d.id !== rolledId) card.classList.add('selected');
  if (d.id === selectedId && d.id === rolledId) {} // rolled styling takes precedence until overridden

  const name  = makeEl('div', 'dysc-name',  d.name);
  const desc  = makeEl('div', 'dysc-desc',  d.desc);
  const bonus = makeEl('div', 'dysc-bonus', d.bonus);

  card.appendChild(name);
  card.appendChild(desc);
  card.appendChild(bonus);

  card.addEventListener('click', () => {
    selectedId = d.id;
    renderGrid(document.querySelector('.search-input').value);
    const summaryText = document.getElementById('summary-text');
    if (selectedId === rolledId) {
      summaryText.textContent = '';
      const strong = makeEl('strong', '', d.name);
      const prefix = document.createTextNode('Auto-rolled: ');
      summaryText.appendChild(prefix);
      summaryText.appendChild(strong);
    } else {
      summaryText.textContent = '';
      const strong = makeEl('strong', '', d.name);
      const prefix = document.createTextNode('Selected: ');
      summaryText.appendChild(prefix);
      summaryText.appendChild(strong);
    }
  });

  return card;
}

function renderGrid(query) {
  const grid = document.getElementById('dysc-grid');
  while (grid.firstChild) grid.removeChild(grid.firstChild);
  const q = (query || '').toLowerCase();
  cholericDysc
    .filter(d => !q || d.name.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q))
    .forEach(d => grid.appendChild(buildDyscCard(d)));
}

function filterDysc(q) { renderGrid(q); }

function reroll() {
  const prev = rolledId;
  // pick a different random entry
  let next = prev;
  while (next === prev && cholericDysc.length > 1) {
    next = cholericDysc[Math.floor(Math.random() * cholericDysc.length)].id;
  }
  rolledId   = next;
  selectedId = next;
  renderGrid(document.querySelector('.search-input').value);
  const d = cholericDysc.find(x => x.id === next);
  const summaryText = document.getElementById('summary-text');
  summaryText.textContent = '';
  const strong = makeEl('strong', '', d.name);
  const prefix = document.createTextNode('Auto-rolled: ');
  summaryText.appendChild(prefix);
  summaryText.appendChild(strong);
}

renderGrid('');
</script>
</body>
</html>
